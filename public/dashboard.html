<!-- public/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Server Health Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#020617;
  color:white;
  padding:30px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

h1{
  font-size:40px;
}

.icon{width:20px;height:20px;vertical-align:middle;fill:#38bdf8;margin-right:8px}

.device-line{margin:6px 0}
.device-name{font-weight:700}

a{
  color:white;
  text-decoration:none;
  background:#0ea5e9;
  padding:12px 22px;
  border-radius:10px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:25px;
}

.card{
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.card h2{
  margin-bottom:20px;
  color:#38bdf8;
}

canvas{
  background:white;
  border-radius:10px;
  padding:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.stat{
  background:#111827;
  padding:20px;
  border-radius:18px;
  text-align:center;
}

.stat h3{
  color:#38bdf8;
  margin-bottom:10px;
}

.value{
  font-size:32px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
  <h1>
    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M3 3v18h18" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="7" y="12" width="2" height="6" />
      <rect x="11" y="8" width="2" height="10" />
      <rect x="15" y="4" width="2" height="14" />
    </svg>
    Server Health Dashboard
  </h1>

  <a href="/">Home</a>
</div>

<div class="stats">

  <div class="stat">
    <h3>API Hits</h3>
    <div class="value" id="apiVal">0</div>
  </div>

  <div class="stat">
    <h3>CPU Usage</h3>
    <div class="value" id="cpuVal">0%</div>
  </div>

  <div class="stat">
    <h3>Memory</h3>
    <div class="value" id="memVal">0 MB</div>
  </div>

  <div class="stat" id="deviceStat">
    <h3>Device</h3>
    <div class="value" id="deviceInfo">—</div>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h2>API Requests</h2>
    <canvas id="apiChart"></canvas>
  </div>

  <div class="card">
    <h2>CPU Usage</h2>
    <canvas id="cpuChart"></canvas>
  </div>

  <div class="card">
    <h2>Memory Usage</h2>
    <canvas id="memChart"></canvas>
  </div>

</div>

<script>

const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://")
  + location.host
);

const labels = [];
const apiData = [];
const cpuData = [];
const memData = [];

function createChart(id, label, data, color) {

  return new Chart(
    document.getElementById(id),
    {
      type:"line",

      data:{
        labels,

        datasets:[
          {
            label,
            data,
            borderColor:color,
            tension:0.3,
            borderWidth:3,
            fill:false
          }
        ]
      },

      options:{
        responsive:true,
        animation:false
      }
    }
  );
}

const apiChart = createChart(
  "apiChart",
  "API Hits",
  apiData,
  "#38bdf8"
);

const cpuChart = createChart(
  "cpuChart",
  "CPU %",
  cpuData,
  "#22c55e"
);

const memChart = createChart(
  "memChart",
  "Memory MB",
  memData,
  "#f97316"
);

function pushData(d){

  if(labels.length > 60){
    labels.shift();
    apiData.shift();
    cpuData.shift();
    memData.shift();
  }

  labels.push(
    new Date(d.time).toLocaleTimeString()
  );

  apiData.push(d.apiHits);
  cpuData.push(d.cpu);
  memData.push(d.memory);

  document.getElementById("apiVal").innerText =
    d.apiHits;

  document.getElementById("cpuVal").innerText =
    d.cpu + "%";

  document.getElementById("memVal").innerText =
    d.memory + " MB";
}

ws.onmessage = (e) => {

  const msg = JSON.parse(e.data);

  if(msg.type === "history"){
    msg.data.forEach(pushData);
  }

  if(msg.type === "live"){
    pushData(msg.data);
  }

  // device info can be sent as msg.device or inside msg.data.device
  const device = msg.device || (msg.data && msg.data.device) || (msg.data && msg.data.system);
  if(device){
    updateDevice(device);
  }

  apiChart.update();
  cpuChart.update();
  memChart.update();
};

function formatUptime(s){
  if(!s && s !== 0) return '—';
  const sec = Math.floor(s);
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const ss = sec%60;
  return `${h}h ${m}m ${ss}s`;
}

function updateDevice(info){
  const el = document.getElementById('deviceInfo');
  const hostname = info.hostname || info.name || info.deviceName || '—';
  const platform = info.platform || info.os || '—';
  const arch = info.arch || info.architecture || '—';
  const cpuModel = info.cpuModel || info.cpu || (info.cpus && info.cpus[0] && info.cpus[0].model) || '—';
  const cpuCount = info.cpus ? (info.cpus.length) : (info.cpuCount || '—');
  const uptime = formatUptime(info.uptime || info.systemUptime || info.uptimeSeconds);

  el.innerHTML = `
    <div class="device-line"><span class="device-name">Name:</span> ${hostname}</div>
    <div class="device-line"><span class="device-name">Platform:</span> ${platform}</div>
    <div class="device-line"><span class="device-name">Arch:</span> ${arch}</div>
    <div class="device-line"><span class="device-name">Processor:</span> ${cpuModel}</div>
    <div class="device-line"><span class="device-name">CPUs:</span> ${cpuCount}</div>
    <div class="device-line"><span class="device-name">Uptime:</span> ${uptime}</div>
  `;
}

</script>

</body>
</html>
