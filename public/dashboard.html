<!-- public/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Server Health Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#020617;
  color:white;
  padding:30px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

h1{
  font-size:40px;
}

a{
  color:white;
  text-decoration:none;
  background:#0ea5e9;
  padding:12px 22px;
  border-radius:10px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:25px;
}

.card{
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.card h2{
  margin-bottom:20px;
  color:#38bdf8;
}

canvas{
  background:white;
  border-radius:10px;
  padding:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.stat{
  background:#111827;
  padding:20px;
  border-radius:18px;
  text-align:center;
}

.stat h3{
  color:#38bdf8;
  margin-bottom:10px;
}

.value{
  font-size:32px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
  <h1>📊 Server Health Dashboard</h1>

  <a href="/">⬅ Home</a>
</div>

<div class="stats">

  <div class="stat">
    <h3>API Hits</h3>
    <div class="value" id="apiVal">0</div>
  </div>

  <div class="stat">
    <h3>CPU Usage</h3>
    <div class="value" id="cpuVal">0%</div>
  </div>

  <div class="stat">
    <h3>Memory</h3>
    <div class="value" id="memVal">0 MB</div>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h2>API Requests</h2>
    <canvas id="apiChart"></canvas>
  </div>

  <div class="card">
    <h2>CPU Usage</h2>
    <canvas id="cpuChart"></canvas>
  </div>

  <div class="card">
    <h2>Memory Usage</h2>
    <canvas id="memChart"></canvas>
  </div>

</div>

<script>

const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://")
  + location.host
);

const labels = [];
const apiData = [];
const cpuData = [];
const memData = [];

function createChart(id, label, data, color) {

  return new Chart(
    document.getElementById(id),
    {
      type:"line",

      data:{
        labels,

        datasets:[
          {
            label,
            data,
            borderColor:color,
            tension:0.3,
            borderWidth:3,
            fill:false
          }
        ]
      },

      options:{
        responsive:true,
        animation:false
      }
    }
  );
}

const apiChart = createChart(
  "apiChart",
  "API Hits",
  apiData,
  "#38bdf8"
);

const cpuChart = createChart(
  "cpuChart",
  "CPU %",
  cpuData,
  "#22c55e"
);

const memChart = createChart(
  "memChart",
  "Memory MB",
  memData,
  "#f97316"
);

function pushData(d){

  if(labels.length > 60){
    labels.shift();
    apiData.shift();
    cpuData.shift();
    memData.shift();
  }

  labels.push(
    new Date(d.time).toLocaleTimeString()
  );

  apiData.push(d.apiHits);
  cpuData.push(d.cpu);
  memData.push(d.memory);

  document.getElementById("apiVal").innerText =
    d.apiHits;

  document.getElementById("cpuVal").innerText =
    d.cpu + "%";

  document.getElementById("memVal").innerText =
    d.memory + " MB";
}

ws.onmessage = (e) => {

  const msg = JSON.parse(e.data);

  if(msg.type === "history"){
    msg.data.forEach(pushData);
  }

  if(msg.type === "live"){
    pushData(msg.data);
  }

  apiChart.update();
  cpuChart.update();
  memChart.update();
};

</script>

</body>
</html>
