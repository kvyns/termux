<!DOCTYPE html>
<html>
<head>
  <title>Server Health Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>📊 Server Health (Live)</h2>

  <canvas id="apiChart"></canvas>
  <canvas id="cpuChart"></canvas>
  <canvas id="memChart"></canvas>

<script>
const ws = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

const labels = [];
const apiData = [];
const cpuData = [];
const memData = [];

function createChart(id, label, data) {
  return new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderWidth: 2,
        fill: false
      }]
    }
  });
}

const apiChart = createChart("apiChart", "API Hits", apiData);
const cpuChart = createChart("cpuChart", "CPU %", cpuData);
const memChart = createChart("memChart", "Memory (MB)", memData);


ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);

  if (msg.type === "history") {
    msg.data.forEach(d => pushData(d));
  }

  if (msg.type === "live") {
    pushData(msg.data);
  }

  apiChart.update();
  cpuChart.update();
  memChart.update();
};

function pushData(d) {
  if (labels.length > 60) {
    labels.shift();
    apiData.shift();
    cpuData.shift();
    memData.shift();
  }

  labels.push(new Date(d.time).toLocaleTimeString());
  apiData.push(d.apiHits);
  cpuData.push(d.cpu);
  memData.push(d.memory);
}


</script>
</body>
</html>
